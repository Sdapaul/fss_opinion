name: FSS 비조치의견서·법령해석 알림

on:
  schedule:
    # KST 오전 7시 = UTC 22:00 (전날)
    - cron: "0 22 * * *"
    # KST 오후 3시 = UTC 06:00
    - cron: "0 6 * * *"
  # 수동 실행 버튼 (테스트용)
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # seen_items.json 커밋 권한

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          # 봇 커밋 후 push 할 수 있도록 token 사용
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 신규 항목 확인 및 이메일 발송
        env:
          FSS_EMAIL_SENDER:     ${{ secrets.FSS_EMAIL_SENDER }}
          FSS_EMAIL_PASSWORD:   ${{ secrets.FSS_EMAIL_PASSWORD }}
          FSS_EMAIL_RECIPIENTS: ${{ secrets.FSS_EMAIL_RECIPIENTS }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: seen_items.json 변경사항 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_items.json
          # 변경이 있을 때만 커밋
          git diff --cached --quiet || git commit -m "chore: update seen_items.json [skip ci]"
          git push
